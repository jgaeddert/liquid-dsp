name: Processor Emulation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - qemu-dev

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] #, macos-latest] #, windows-latest]
        example: [examples/platformio_example.c]

    steps:
    - uses: actions/checkout@v2

    - name: Setup environment (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get -qq install -y --no-install-recommends build-essential gcc-powerpc64le-linux-gnu g++-powerpc64le-linux-gnu qemu-user-static binfmt-support file

    - name: build
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain_ppc64le.cmake -DENABLE_SIMD=ON -DFIND_SIMD=OFF -DC_ALTIVEC_FOUND=TRUE -DC_ALTIVEC_FLAGS="-maltivec" -DFIND_FFTW=OFF -DBUILD_EXAMPLES=OFF -DBUILD_BENCHMARKS=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_EXE_LINKER_FLAGS="-static" ..
        make -j4
        file xautotest # assert this is for PowerPC

    - name: check
      run: |
        cd build
        ./xautotest -v -t 0

