name: Python CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - bind-scikit-build-dev

jobs:
  baseline:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, macos-latest]

    name: "💦 ${{ matrix.runs-on }}"
    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment (macOS)
      if: runner.os == 'macos'
      run: |
        brew update
        brew install cmake virtualenv pybind11

    - name: Setup environment (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install -y --no-install-recommends build-essential virtualenv python3-dev pybind11-dev

    #- name: Setup libfec
    #  run: git clone https://github.com/jgaeddert/libfec.git && cd libfec && ./configure && make && sudo make install

    - name: Build and test
      run: |
        virtualenv env/liquid
        source env/liquid/bin/activate
        python -m pip install pybind11 numpy matplotlib
        mkdir build
        cd build
        cmake -D BUILD_PYTHON=ON ..
        make -j4
        ./xautotest -o autotest.json
        python3 -c "import liquid as dsp; print('liquid-dsp python version:',dsp.__version__)"
        #make install
        #ldconfig
        #make check-link
        #make doc-check
        #make bench

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: baseline
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-latest is apple silicon, macos-15-intel is x86_64
        # see: https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/
        # note: macos-15 runner will be deprecated fall 2027
        os: [macos-latest, macos-15-intel, ubuntu-latest] # windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        # env:
        #   CIBW_SOME_OPTION: value
        #    ...
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

